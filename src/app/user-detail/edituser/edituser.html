<div class="container">
  <div class="header">
    <h1>Edit User</h1>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>ID</mat-label>
            <input matInput formControlName="id" [disabled]="true" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Enter name" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" placeholder="Enter username" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="Enter email" type="email" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" placeholder="Enter phone" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Website</mat-label>
            <input matInput formControlName="website" placeholder="Enter website" />
          </mat-form-field>
        </div>

        <div formGroupName="address">
          <h3>Address</h3>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Street</mat-label>
            <input matInput formControlName="street" placeholder="Enter street" />
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Suite</mat-label>
              <input matInput formControlName="suite" placeholder="Enter suite" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>City</mat-label>
              <input matInput formControlName="city" placeholder="Enter city" />
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Zipcode</mat-label>
            <input matInput formControlName="zipcode" placeholder="Enter zipcode" />
          </mat-form-field>
        </div>

        <div formGroupName="company">
          <h3>Company</h3>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Company Name</mat-label>
            <input matInput formControlName="name" placeholder="Enter company name" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Catch Phrase</mat-label>
            <input matInput formControlName="catchPhrase" placeholder="Enter catch phrase" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>BS</mat-label>
            <input matInput formControlName="bs" placeholder="Enter bs" />
          </mat-form-field>
        </div>

        <div class="button-row">
          <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid || loading()">
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Update User
            }
          </button>
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
